services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://quizz:quizz@postgres:5432/quizz
      REDIS_URL: redis://redis:6379/0
      MEDIA_DIR: media
    depends_on:
      - postgres
      - redis
    volumes:
      - ./media:/app/media

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: quizz
      POSTGRES_PASSWORD: quizz
      POSTGRES_DB: quizz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
